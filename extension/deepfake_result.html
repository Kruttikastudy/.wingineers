<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deepfake Detection Result — PhishGuard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
      color: #fff;
      padding: 24px;
    }

    .result-container {
      max-width: 600px;
      width: 100%;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #93c5fd;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    h1 span {
      color: #ef4444;
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .verdict-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .verdict-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .verdict-label {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .verdict-text {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .verdict-deepfake {
      color: #ef4444;
    }

    .verdict-authentic {
      color: #22c55e;
    }

    .verdict-inconclusive {
      color: #f59e0b;
    }

    .confidence-section {
      margin-top: 20px;
    }

    .confidence-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .confidence-label {
      color: rgba(255, 255, 255, 0.6);
      font-weight: 600;
    }

    .confidence-percent {
      color: #fff;
      font-weight: 700;
    }

    .confidence-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s ease;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
    }

    .confidence-fill.high-deepfake {
      background: linear-gradient(90deg, #ef4444, #dc2626);
    }

    .confidence-fill.high-authentic {
      background: linear-gradient(90deg, #22c55e, #16a34a);
    }

    .details-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.7);
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
    }

    .detail-value {
      color: #fff;
      font-weight: 600;
    }

    .progress-container {
      text-align: center;
      padding: 40px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border: 3px solid rgba(59, 130, 246, 0.3);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .progress-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 120px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.7);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .error-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #fca5a5;
      margin-bottom: 20px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="result-container">
    <!-- Loading State -->
    <div id="loadingState" class="progress-container">
      <div class="spinner"></div>
      <p class="progress-text">Analyzing media for deepfakes...</p>
      <p class="progress-text" style="font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 8px;">
        This may take 5-15 seconds
      </p>
    </div>

    <!-- Result State -->
    <div id="resultState" class="hidden">
      <div class="result-badge">
        <span>✓ Analysis Complete</span>
      </div>

      <h1 id="verdictText"></h1>
      <p class="subtitle" id="verdictSubtitle"></p>

      <div class="verdict-card">
        <div class="verdict-header">
          <span class="verdict-label">Detection Result</span>
        </div>
        <div class="verdict-text" id="verdictValue"></div>

        <div class="confidence-section">
          <div class="confidence-header">
            <span class="confidence-label">Confidence Score</span>
            <span class="confidence-percent" id="confidencePercent">0%</span>
          </div>
          <div class="confidence-bar">
            <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div id="detailsCard" class="details-card hidden">
        <div id="detailsList"></div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="closeBtn">Close</button>
      </div>
    </div>

    <!-- Error State -->
    <div id="errorState" class="hidden">
      <div class="error-badge">
        <span>⚠️ Analysis Failed</span>
      </div>

      <h1>Unable to Analyze</h1>
      <p class="subtitle" id="errorMessage"></p>

      <div class="actions" style="margin-top: 28px;">
        <button class="btn btn-primary" id="retryBtn">Retry</button>
        <button class="btn btn-secondary" id="closeErrorBtn">Close</button>
      </div>
    </div>
  </div>

  <script src="deepfake_result.js"></script>
</body>
</html>
